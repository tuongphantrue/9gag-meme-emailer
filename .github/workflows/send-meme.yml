name: Send Top Meme of the Day

on:
  schedule:
    # Runs at 02:00 UTC = 09:00 Hanoi time (UTC+7) every day.
    # Cron is always UTC on GitHub Actions — convert your local time.
    - cron: "0 2 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  send-meme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run meme emailer
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MEME_RECIPIENT: ${{ secrets.MEME_RECIPIENT }}
          MEMES_PER_SECTION: "30"         # top N per section (static image / video / gif)
          GRID_COLUMNS: "3"               # cards per row in the HTML digest
          TIMEZONE: "Asia/Ho_Chi_Minh"    # used for the date/time shown in the subject line
        run: python 9gag_top_meme_emailer.py
