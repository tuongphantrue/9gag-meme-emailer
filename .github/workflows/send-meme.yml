name: Send Top Meme of the Day

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-meme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests Pillow
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Generate digest (fetch, classify, download, compress)
        env:
          MEMES_PER_SECTION: "30"
          GRID_COLUMNS: "3"
          TIMEZONE: "Asia/Ho_Chi_Minh"
        run: python 9gag_top_meme_emailer.py generate

      - name: Publish images to the meme-assets branch
        run: |
          if [ -z "$(ls -A previews 2>/dev/null)" ]; then
            echo "No images generated, skipping publish step."
            exit 0
          fi
          rm -rf /tmp/assets-repo
          mkdir /tmp/assets-repo
          cd /tmp/assets-repo
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b meme-assets
          cp -r "$GITHUB_WORKSPACE/previews" .
          git add -A
          git commit -q -m "Update meme previews - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -q --force origin meme-assets

      - name: Wait for raw.githubusercontent.com to serve the new files
        run: sleep 30

      - name: Send email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MEME_RECIPIENT: ${{ secrets.MEME_RECIPIENT }}
        run: python 9gag_top_meme_emailer.py send
